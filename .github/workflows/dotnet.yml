name: Build .NET Framework Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      # Setup NuGet
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
      
      # Restore NuGet packages
      - name: Restore NuGet packages
        run: nuget restore "SubtitleEdit.sln"
      
      # Build the solution
      - name: Build solution
        run: msbuild "SubtitleEdit.sln" /p:Configuration=Release

      # Run unit-tests
      - name: Run tests
        uses: microsoft-approved-actions/vstest@master
        with:
          testAssembly: src\Test\bin\Release\Test.dll
          runInParallel: true
#        run: dotnet test --no-build --verbosity normal "SubtitleEdit.sln"
#        run: vstest.console "src\Test\bin\Release\Test.dll"
